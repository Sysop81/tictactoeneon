<div class="container vh-100 d-flex justify-content-center align-items-center">
  <div class="row">
    <div class="col-12">
      <table class="table table-bordered text-center p-4">
          @for (row of table(); let i = $index; track i) {
            <tr>
              @for (col of row; let x = $index; track x) {
                <td class="border p-4" (click)="cellClick(i,x)">{{ col }}</td>
              }
            </tr>
          }
        </table>
    </div>
  </div>
</div>
